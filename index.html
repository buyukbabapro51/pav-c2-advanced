<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yerel Ağ Simülasyon Merkezi</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="container">
    <h1>Web Dağıtık Sistem Paneli</h1>
    
    <div class="panel">
        <h3 class="panel-title">Aktif Bağlantı İstasyonları</h3>
        <table>
            <thead>
                <tr>
                    <th>İstasyon ID</th>
                    <th>IP Adresi</th>
                    <th>Haberleşme Durumu</th>
                    <th>Son Veri Logu</th>
                </tr>
            </thead>
            <tbody id="node-table">
                </tbody>
        </table>
    </div>
</div>

<script>
    async function updateDashboard() {
        try {
            const response = await fetch('/api/nodes');
            const nodes = await response.json();
            const tbody = document.getElementById('node-table');
            tbody.innerHTML = '';

            if (nodes.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:var(--text-muted);">Aktif bağlı düğüm bulunmuyor.</td></tr>`;
                return;
            }

            nodes.forEach(node => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${node.id}</strong></td>
                    <td>${node.ip}</td>
                    <td><span class="status">${node.status}</span></td>
                    <td style="color:var(--text-muted);">${node.lastMessage}</td>
                `;
                tbody.appendChild(tr);
            });
        } catch (error) {
            console.error("Veri güncelleme hatası:", error);
        }
    }

    // Her 2 saniyede bir arayüzü yeni verilerle yeniler
    setInterval(updateDashboard, 2000);
    updateDashboard();
</script>
</body>
</html>
